name: Build Debug APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Permite iniciar a compilação manualmente no painel do GitHub

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x' # Ajuste para a versão exata que você usa, se preferir
          channel: 'stable'

      - name: 📦 Instalar dependências
        run: flutter pub get

      - name: 🛠️ Compilar APK (Debug)
        run: flutter build apk --debug

      - name: 🚀 Disponibilizar APK para download
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 1 # O APK ficará disponível por 1 dias no GitHub
