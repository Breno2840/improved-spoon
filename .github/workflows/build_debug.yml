name: Build Debug APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'  # ← Use a versão exata para evitar inconsistências
          channel: 'stable'

      # 🔥 LIMPEZA ANTES DE TUDO (essencial para CI)
      - name: 🧹 Limpar build e cache
        run: |
          flutter clean
          rm -rf android/.gradle android/app/.gradle

      - name: 📦 Instalar dependências
        run: flutter pub get

      # ✅ Validação opcional: confirma que o Embedding V2 está detectado
      - name: 🔍 Verificar Android Embedding
        run: |
          grep -q "flutterEmbedding.*2" android/app/src/main/AndroidManifest.xml && echo "✅ Embedding V2 confirmado"

      - name: 🛠️ Compilar APK (Debug)
        run: flutter build apk --debug

      - name: 🚀 Disponibilizar APK para download
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 1