name: Build Debug APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 11 (Mais estável para build)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: 🐦 Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # Não fixar versão aqui deixa o GitHub usar a mais recente do canal stable

      - name: 🛠️ Reparar Projeto e Pub Get
        run: |
          # Deleta arquivos de configuração que podem estar corrompidos
          rm -rf .dart_tool
          rm -f .packages
          rm -f pubspec.lock
          # Força o Flutter a regenerar os arquivos do Android
          flutter create . --platforms android
          flutter pub get

      - name: 🚀 Compilar APK Debug
        run: flutter build apk --debug

      - name: 📤 Upload
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
