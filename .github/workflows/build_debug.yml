name: Build Debug APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'

      # 🔥 Precache dos artefatos Android (essencial para validação de plugins)
      - name: 📦 Precache Android artifacts
        run: flutter precache --android

      # 🔥 Limpeza de cache para evitar conflitos
      - name: 🧹 Limpar cache
        run: |
          flutter clean
          rm -rf android/.gradle android/app/.gradle

      # ✅ Definir variáveis de ambiente para o Flutter detectar o Android corretamente
      - name: ⚙️ Configurar ambiente Android
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          echo "SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV

      - name: 📦 Instalar dependências
        run: flutter pub get

      # ✅ Validação: confirma que o embedding V2 está presente
      - name: 🔍 Verificar Embedding V2
        run: |
          if grep -q "flutterEmbedding.*2" android/app/src/main/AndroidManifest.xml; then
            echo "✅ Embedding V2 confirmado"
          else
            echo "❌ Embedding V2 não encontrado!"
            exit 1
          fi

      - name: 🛠️ Compilar APK (Debug)
        run: flutter build apk --debug

      - name: 🚀 Disponibilizar APK para download
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 1