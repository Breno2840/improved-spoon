name: reader
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
    
  # Seleção de arquivos locais do dispositivo
  file_picker: ^8.0.0
  
  # Visualizador de EPUB
  epub_view: ^3.2.0
  
  # Visualizador de PDF
  flutter_pdfview: ^1.3.2
  
  # Manipulação de diretórios do sistema
  path_provider: ^2.1.2
  
  # Gerenciamento de permissões (necessário para ler o armazenamento)
  permission_handler: ^11.3.0
  
  # Fontes bonitas e fáceis para a interface (Inter, Lora, etc.)
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
